apiVersion: aws.platform.upbound.io/v1alpha1
kind: SQLInstance
metadata:
  name: configuration-aws-database-mariadb
  namespace: default
spec:
  parameters:
    region: us-west-2
    engine: mariadb
    engineVersion: "11.8.3"
    storageGB: 5
    autoGeneratePassword: true
    passwordSecretRef:
      name: mariadbsecret
      key: password
    networkRef:
      id: configuration-aws-database